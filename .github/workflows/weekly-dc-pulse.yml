# Weekly DC Pulse digest: collect RSS, cluster/rank topics, optional OpenAI narrative, email.
# Manual run: Actions tab -> Weekly DC Pulse -> Run workflow.
name: Weekly DC Pulse

on:
  # Scheduled runs moved to Debian VM (cron/systemd). Manual run only here.
  workflow_dispatch: {}

concurrency:
  group: dc-pulse-weekly
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run DC Pulse pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          DC_PULSE_EMAIL_TO: ${{ secrets.DC_PULSE_EMAIL_TO }}
          DC_PULSE_EMAIL_FROM: ${{ secrets.DC_PULSE_EMAIL_FROM }}
          DC_PULSE_SMTP_HOST: ${{ secrets.DC_PULSE_SMTP_HOST }}
          DC_PULSE_SMTP_PORT: ${{ secrets.DC_PULSE_SMTP_PORT }}
          DC_PULSE_SMTP_USER: ${{ secrets.DC_PULSE_SMTP_USER }}
          DC_PULSE_SMTP_PASSWORD: ${{ secrets.DC_PULSE_SMTP_PASSWORD }}
          DC_PULSE_SMTP_TLS: ${{ secrets.DC_PULSE_SMTP_TLS }}
          DC_PULSE_LOG_LEVEL: INFO
          DC_PULSE_DRY_RUN: "0"
        run: python -m src.main

      - name: Upload digest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: last-digest
          path: last_digest.txt
          if-no-files-found: ignore
